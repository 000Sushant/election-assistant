<header class="main-header">
  <div class="logo-container">
    <img src="assets/votika.png" alt="Votika Avatar" class="logo-img persona">
    <div class="title-group">
      <h1 class="app-title">Votika</h1>
      <p class="app-subtitle">Your Elegant Election Guide</p>
    </div>
  </div>

  <div class="header-center">
    <div class="nav-stat">
      <span class="stat-label">Total Voters</span>
      <span class="stat-value">96.8 Cr</span>
    </div>
    <div class="stat-divider"></div>
    <div class="nav-stat">
      <span class="stat-label">Polling Stations</span>
      <span class="stat-value">10.5 Lakh+</span>
    </div>
    <div class="stat-divider"></div>
    <button class="nav-portal-btn" (click)="openVoterPortal()">
      <span class="icon">🔗</span>
      Voter Portal
    </button>
  </div>

  <div class="header-status">
    <span class="status-dot"></span>
    <span class="status-text">Online</span>
  </div>
</header>
